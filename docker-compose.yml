services:
  bot:
    build: .
    container_name: asic-bot
    restart: unless-stopped
    env_file: .env
    command: python bot.py
    volumes:
      - ./data:/data

  admin:
    build: .
    container_name: asic-admin
    restart: unless-stopped
    env_file: .env
    command: uvicorn admin:app --host 0.0.0.0 --port 8080
    ports:
      - "38472:8080"
    volumes:
      - ./data:/data
